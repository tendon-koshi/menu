<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海老天丼 こし | Menu</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1a1a1a;font-family:'Hiragino Mincho ProN','Yu Mincho',Georgia,serif;height:100vh;height:100dvh;overflow:hidden;display:flex;flex-direction:column;}
.header{background:#EDE3CC;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #D4B896;flex-shrink:0;}
.logo{font-size:1.1rem;font-weight:900;letter-spacing:.08em;color:#2C1A0E;line-height:1.2;}
.logo span{display:block;font-size:.62rem;font-weight:700;color:#6B4C2A;letter-spacing:.18em;margin-top:1px;}
.lang-sw{display:flex;gap:4px;}
.lb{padding:6px 11px;border:2px solid #6B4C2A;background:#FDFAF4;color:#2C1A0E;border-radius:16px;font-size:.75rem;font-weight:800;cursor:pointer;font-family:inherit;}
.lb.active{background:#C0392B;color:#fff;border-color:#C0392B;}
.viewer{flex:1;position:relative;overflow:hidden;}
iframe{width:100%;height:100%;border:none;display:block;}
</style>
</head>
<body>
<div class="header">
  <div class="logo">海老天丼 こし<span>TENDON KOSHI</span></div>
  <div class="lang-sw">
    <button class="lb active" onclick="setLang('ja')">日本語</button>
    <button class="lb" onclick="setLang('en')">English</button>
    <button class="lb" onclick="setLang('zh')">中文</button>
  </div>
</div>
<div class="viewer">
  <iframe id="pdfframe" src="menu-ja.pdf"></iframe>
</div>
<script>
function setLang(l){
  var files={ja:'menu-ja.pdf',en:'menu-en.pdf',zh:'menu-zh.pdf'};
  document.getElementById('pdfframe').src=files[l];
  document.querySelectorAll('.lb').forEach(function(b,i){
    b.classList.remove('active');
    if((i===0&&l==='ja')||(i===1&&l==='en')||(i===2&&l==='zh'))b.classList.add('active');
  });
}
</script>
</body>
</html>
