<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海老天丼 こし | Menu</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;height:100dvh;overflow:hidden;font-family:'Hiragino Mincho ProN','Yu Mincho',Georgia,serif;background:#F5EFE0;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;}

.logo-area{text-align:center;margin-bottom:52px;}
.logo-name{font-size:2.2rem;font-weight:900;letter-spacing:.15em;color:#2C1A0E;display:block;}
.logo-sub{font-size:.9rem;font-weight:700;color:#9C7A4A;letter-spacing:.25em;display:block;margin-top:8px;}

.prompt{font-size:.88rem;color:#6B4C2A;text-align:center;line-height:2;margin-bottom:32px;letter-spacing:.03em;}

.btns{display:flex;flex-direction:column;gap:16px;width:280px;}

.lang-btn{
  display:block;
  padding:20px 0;
  border:2.5px solid #C0392B;
  background:#fff;
  border-radius:14px;
  text-decoration:none;
  text-align:center;
  transition:background .15s,color .15s;
}
.lang-btn:active,.lang-btn:hover{background:#C0392B;}
.lang-btn .main{display:block;font-size:1.15rem;font-weight:900;color:#2C1A0E;letter-spacing:.1em;}
.lang-btn .sub{display:block;font-size:.72rem;font-weight:500;color:#9C7A4A;margin-top:4px;letter-spacing:.05em;}
.lang-btn:active .main,.lang-btn:hover .main{color:#fff;}
.lang-btn:active .sub,.lang-btn:hover .sub{color:#ffdddd;}
</style>
</head>
<body>
  <div class="logo-area">
    <span class="logo-name">海老天丼 こし</span>
    <span class="logo-sub">TENDON KOSHI</span>
  </div>

  <div class="prompt">
    言語を選択してください<br>
    Please select your language<br>
    请选择语言
  </div>

  <div class="btns">
    <a class="lang-btn" href="menu-ja.pdf">
      <span class="main">日本語</span>
      <span class="sub">Japanese</span>
    </a>
    <a class="lang-btn" href="menu-en.pdf">
      <span class="main">English</span>
      <span class="sub">英語</span>
    </a>
    <a class="lang-btn" href="menu-zh.pdf">
      <span class="main">中文</span>
      <span class="sub">Chinese / 中国語</span>
    </a>
  </div>
</body>
</html>
