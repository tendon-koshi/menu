<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>海老天丼 こし | Menu</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1a1a1a;font-family:'Hiragino Mincho ProN','Yu Mincho',Georgia,serif;height:100vh;overflow:hidden;}

/* HEADER */
.header{background:#EDE3CC;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #D4B896;}
.logo{font-size:1rem;letter-spacing:.1em;color:#2C1A0E;}
.logo span{display:block;font-size:.6rem;color:#9C7A4A;letter-spacing:.15em;}
.lang-sw{display:flex;gap:4px;}
.lb{padding:5px 10px;border:1.5px solid #D4B896;background:#FDFAF4;color:#6B4C2A;border-radius:16px;font-size:.7rem;cursor:pointer;font-family:inherit;}
.lb.active{background:#C0392B;color:#fff;border-color:#C0392B;}

/* PAGE INDICATOR */
.page-bar{background:#2C1A0E;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;}
.page-info{color:#D4B896;font-size:.75rem;letter-spacing:.05em;}
.dots{display:flex;gap:5px;align-items:center;}
.dot{width:6px;height:6px;border-radius:50%;background:#6B4C2A;transition:all .3s;}
.dot.active{background:#C0392B;width:8px;height:8px;}

/* VIEWER */
.viewer{position:relative;height:calc(100vh - 90px);overflow:hidden;touch-action:pan-y;}
.pages-track{display:flex;height:100%;transition:transform .35s cubic-bezier(.4,0,.2,1);will-change:transform;}
.page-slide{flex-shrink:0;width:100vw;height:100%;display:flex;align-items:center;justify-content:center;padding:8px;}
.page-slide canvas{max-width:100%;max-height:100%;border-radius:4px;box-shadow:0 4px 20px rgba(0,0,0,.5);}
.page-slide .loading{color:#9C7A4A;font-size:.85rem;text-align:center;}

/* NAV ARROWS */
.nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(44,26,14,.7);color:#EDE3CC;border:none;font-size:1.4rem;width:36px;height:56px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;transition:opacity .2s;}
.nav:disabled{opacity:.2;}
.nav-l{left:4px;}
.nav-r{right:4px;}

/* LANG MENU */
.lang-menu{background:#EDE3CC;border-bottom:2px solid #D4B896;padding:6px 16px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
.lang-menu::-webkit-scrollbar{display:none;}
.lm-btn{flex-shrink:0;padding:4px 12px;border:1px solid #D4B896;background:#FDFAF4;color:#6B4C2A;border-radius:12px;font-size:.68rem;cursor:pointer;font-family:inherit;white-space:nowrap;}
.lm-btn.active{background:#C0392B;color:#fff;border-color:#C0392B;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">海老天丼 こし<span>TENDON KOSHI</span></div>
  <div class="lang-sw">
    <button class="lb active" onclick="setLang('ja')">日本語</button>
    <button class="lb" onclick="setLang('en')">English</button>
    <button class="lb" onclick="setLang('zh')">中文</button>
  </div>
</div>

<div class="page-bar">
  <div class="page-info" id="page-info">1 / 8</div>
  <div class="dots" id="dots"></div>
</div>

<div class="viewer" id="viewer">
  <div class="pages-track" id="track"></div>
  <button class="nav nav-l" id="nav-l" onclick="prevPage()">‹</button>
  <button class="nav nav-r" id="nav-r" onclick="nextPage()">›</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

var langs = {
  ja: { file: 'menu-ja.pdf', pages: 8 },
  en: { file: 'menu-en.pdf', pages: 6 },
  zh: { file: 'menu-zh.pdf', pages: 6 }
};

var currentLang = 'ja';
var currentPage = 0;
var pdfDoc = null;
var renderedPages = {};
var totalPages = 8;

function buildSlides(n) {
  var track = document.getElementById('track');
  track.innerHTML = '';
  renderedPages = {};
  for (var i = 0; i < n; i++) {
    var slide = document.createElement('div');
    slide.className = 'page-slide';
    slide.id = 'slide-' + i;
    slide.innerHTML = '<div class="loading">読み込み中...</div>';
    track.appendChild(slide);
  }
  buildDots(n);
}

function buildDots(n) {
  var dots = document.getElementById('dots');
  dots.innerHTML = '';
  for (var i = 0; i < n; i++) {
    var d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    dots.appendChild(d);
  }
}

function updateDots(page) {
  var dots = document.querySelectorAll('.dot');
  dots.forEach(function(d, i) { d.className = 'dot' + (i === page ? ' active' : ''); });
  document.getElementById('page-info').textContent = (page + 1) + ' / ' + totalPages;
  document.getElementById('nav-l').disabled = page === 0;
  document.getElementById('nav-r').disabled = page === totalPages - 1;
}

function goToPage(page) {
  currentPage = page;
  var track = document.getElementById('track');
  track.style.transform = 'translateX(-' + (page * 100) + 'vw)';
  updateDots(page);
  renderPage(page);
  if (page + 1 < totalPages) renderPage(page + 1);
  if (page - 1 >= 0) renderPage(page - 1);
}

function renderPage(idx) {
  if (!pdfDoc || renderedPages[idx]) return;
  renderedPages[idx] = true;
  pdfDoc.getPage(idx + 1).then(function(page) {
    var slide = document.getElementById('slide-' + idx);
    if (!slide) return;
    var viewer = document.getElementById('viewer');
    var vw = viewer.clientWidth - 16;
    var vh = viewer.clientHeight - 16;
    var viewport = page.getViewport({ scale: 1 });
    var scale = Math.min(vw / viewport.width, vh / viewport.height);
    var scaledVp = page.getViewport({ scale: scale });
    var canvas = document.createElement('canvas');
    canvas.width = scaledVp.width;
    canvas.height = scaledVp.height;
    var ctx = canvas.getContext('2d');
    page.render({ canvasContext: ctx, viewport: scaledVp }).promise.then(function() {
      slide.innerHTML = '';
      slide.appendChild(canvas);
    });
  });
}

function loadPdf(lang) {
  var info = langs[lang];
  totalPages = info.pages;
  currentPage = 0;
  pdfDoc = null;
  buildSlides(totalPages);
  goToPage(0);
  pdfjsLib.getDocument(info.file).promise.then(function(doc) {
    pdfDoc = doc;
    renderPage(0);
    renderPage(1);
  }).catch(function(e) {
    document.getElementById('slide-0').innerHTML = '<div class="loading" style="color:#C0392B">PDFを読み込めませんでした<br>' + e.message + '</div>';
  });
}

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lb').forEach(function(b) { b.classList.remove('active'); });
  var btns = document.querySelectorAll('.lb');
  if (lang==='ja') btns[0].classList.add('active');
  if (lang==='en') btns[1].classList.add('active');
  if (lang==='zh') btns[2].classList.add('active');
  loadPdf(lang);
}

function prevPage() { if (currentPage > 0) goToPage(currentPage - 1); }
function nextPage() { if (currentPage < totalPages - 1) goToPage(currentPage + 1); }

// Touch swipe
var startX = 0;
var viewer = document.getElementById('viewer');
viewer.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; }, { passive: true });
viewer.addEventListener('touchend', function(e) {
  var diff = startX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 40) {
    if (diff > 0) nextPage();
    else prevPage();
  }
}, { passive: true });

// Keyboard
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight') nextPage();
  if (e.key === 'ArrowLeft') prevPage();
});

// Init
loadPdf('ja');
</script>
</body>
</html>
